<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Cloud Card Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ea44f; --dark: #24292e; --blue: #0366d6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; padding: 20px; color: #24292e; }
        .container { max-width: 900px; margin: 0 auto; }
        .config-section, .form-section, .cards-section { background: #fff; border: 1px solid #d1d5da; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        
        h2, h3 { margin-top: 0; border-bottom: 1px solid #eaecef; padding-bottom: 10px; }
        
        .github-input, .card-input { margin-bottom: 10px; width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }

        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-github { background-color: var(--primary); color: white; width: 100%; }
        .btn-primary { background-color: var(--blue); color: white; margin-top: 10px; }
        .btn-secondary { background-color: #eff3f6; border: 1px solid rgba(27,31,35,.15); color: #24292e; }
        .btn:hover { opacity: 0.8; }

        .status-msg { margin-top: 10px; font-size: 0.85rem; padding: 10px; border-radius: 4px; display: none; }
        
        .card-display-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .card-info { font-family: monospace; }
        .delete-btn { color: #d73a49; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fab fa-github"></i> GitHub Secure Storage</h1>
    </header>

    <div class="config-section">
        <h3><i class="fas fa-cog"></i> GitHub Connection</h3>
        <label style="font-size: 0.8rem; font-weight: bold;">GitHub Token</label>
        <input type="password" id="ghToken" class="github-input" value="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">
        
        <label style="font-size: 0.8rem; font-weight: bold;">Repository (user/repo)</label>
        <input type="text" id="ghRepo" class="github-input" value="konamisupport/coins">
        
        <button id="saveToGithub" class="btn btn-github"><i class="fas fa-cloud-upload-alt"></i> Sync All to GitHub</button>
        <div id="ghStatus" class="status-msg"></div>
    </div>

    <div class="main-content">
        <section class="form-section">
            <h2>Add New Card</h2>
            <form id="cardForm">
                <label>Cardholder Name</label>
                <input type="text" id="cardName" class="card-input" placeholder="e.g. John Doe" required>
                
                <label>Card Number</label>
                <input type="text" id="cardNumber" class="card-input" placeholder="0000 0000 0000 0000" maxlength="19" required>
                
                <div class="row">
                    <div>
                        <label>Expiry Date</label>
                        <input type="text" id="cardExpiry" class="card-input" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div>
                        <label>CVC</label>
                        <input type="text" id="cardCVC" class="card-input" placeholder="123" maxlength="4" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Locally</button>
            </form>
        </section>

        <section class="cards-section">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h2>Saved Locally <span id="cardCount">(0)</span></h2>
                <button id="downloadTable" class="btn btn-secondary"><i class="fas fa-file-csv"></i> Download Table (CSV)</button>
            </div>
            <div id="cardsContainer"></div>
        </section>
    </div>
</div>

<script>
    let cards = JSON.parse(localStorage.getItem('creditCards') || '[]');

    // --- CARD NUMBER FORMATTING ---
    document.getElementById('cardNumber').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    // --- GITHUB SYNC LOGIC ---
    document.getElementById('saveToGithub').addEventListener('click', async () => {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const status = document.getElementById('ghStatus');
        
        if (!token || !repo) {
            alert("Enter your GitHub Token and Repo name first!");
            return;
        }

        status.style.display = 'block';
        status.style.background = '#fff5b1';
        status.textContent = "Uploading to GitHub...";

        const fileName = "card_data_backup.json";
        const url = `https://api.github.com/repos/${repo}/contents/${fileName}`;
        
        // Proper encoding for GitHub API (handles special characters better)
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(cards, null, 2)))); 

        try {
            let sha = "";
            const getRes = await fetch(url, { 
                headers: { "Authorization": `token ${token}` } 
            });
            
            if (getRes.ok) { 
                const fileData = await getRes.json(); 
                sha = fileData.sha; 
            }

            const putRes = await fetch(url, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${token}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    message: "Update card backup via web tool", 
                    content: content, 
                    sha: sha 
                })
            });

            if (putRes.ok) {
                status.style.background = "#dcffe4";
                status.textContent = "Synced! Your file is updated on GitHub.";
            } else { 
                const errorData = await putRes.json();
                throw new Error(errorData.message || "Failed to upload."); 
            }
        } catch (error) {
            status.style.background = "#ffeef0";
            status.textContent = "Error: " + error.message;
        }
    });

    // --- CSV TABLE GENERATION ---
    document.getElementById('downloadTable').addEventListener('click', () => {
        if (cards.length === 0) return alert("No cards to download.");
        
        let csv = "Name,Card Number,Expiry,CVC\n";
        cards.forEach(c => {
            csv += `"${c.name}","${c.number}","${c.expiry}","${c.cvc}"\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'credit_cards_table.csv';
        a.click();
    });

    // --- UI LOGIC ---
    function updateUI() {
        localStorage.setItem('creditCards', JSON.stringify(cards));
        document.getElementById('cardCount').textContent = `(${cards.length})`;
        const container = document.getElementById('cardsContainer');
        
        if (cards.length === 0) {
            container.innerHTML = "<p style='color:#666;'>No cards saved locally.</p>";
            return;
        }

        container.innerHTML = cards.map((c, index) => `
            <div class="card-display-item">
                <div>
                    <strong>${c.name}</strong><br>
                    <span class="card-info">**** **** **** ${c.number.slice(-4)} | Exp: ${c.expiry}</span>
                </div>
                <button class="delete-btn" title="Delete" onclick="deleteCard(${index})"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    function deleteCard(index) {
        if(confirm("Delete this card locally?")) {
            cards.splice(index, 1);
            updateUI();
        }
    }

    document.getElementById('cardForm').addEventListener('submit', (e) => {
        e.preventDefault();
        cards.push({
            id: Date.now(),
            name: document.getElementById('cardName').value,
            number: document.getElementById('cardNumber').value,
            expiry: document.getElementById('cardExpiry').value,
            cvc: document.getElementById('cardCVC').value
        });
        updateUI();
        e.target.reset();
    });

    // Initial load
    updateUI();
</script>
</body>
</html>
