            


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Money Transfer</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:40px;
    width:350px;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
    margin-bottom:10px;
    font-size:24px;
    font-weight:700;
}

p{
    margin-bottom:25px;
    font-size:14px;
    opacity:0.8;
}

.country-list{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:15px;
    margin-bottom:25px;
}

.country{
    background: rgba(255,255,255,0.15);
    border-radius:15px;
    padding:15px;
    cursor:pointer;
    transition:0.3s ease;
    border:2px solid transparent;
}

.country:hover{
    transform:scale(1.05);
    background: rgba(255,255,255,0.25);
}

.country.selected{
    border:2px solid #00ffcc;
    background: rgba(0,255,204,0.2);
}

.country img{
    width:40px;
    margin-bottom:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(45deg,#00ffcc,#00c3ff);
    color:#000;
    transition:0.3s ease;
}

button:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
    <h1>Visa Money Transfer</h1>
    <p>Select destination country</p>

    <div class="country-list">
        <div class="country" onclick="selectCountry(this)">
            <img src="https://flagcdn.com/w40/gb.png">
            <div>United Kingdom</div>
        </div>

        <div class="country" onclick="selectCountry(this)">
            <img src="https://flagcdn.com/w40/us.png">
            <div>United States</div>
        </div>

        <div class="country" onclick="selectCountry(this)">
            <img src="https://flagcdn.com/w40/in.png">
            <div>India</div>
        </div>

        <div class="country" onclick="selectCountry(this)">
            <img src="https://flagcdn.com/w40/pk.png">
            <div>Pakistan</div>
        </div>
    </div>

    <button onclick="proceed()">Proceed</button>
</div>

<script>
let selected = null;

function selectCountry(element){
    document.querySelectorAll('.country').forEach(c => {
        c.classList.remove('selected');
    });

    element.classList.add('selected');
    selected = element.innerText;
}

function proceed(){
    if(!selected){
        alert("Please select a country first!");
        return;
    }

    window.location.href = "visa.html";
}
</script>

</body>
</html>
