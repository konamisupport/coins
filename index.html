<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Coin Hub | Instant Top-up</title>
    <style>
        :root {
            --ef-blue: #0046ad;
            --ef-yellow: #fff200;
            --ef-dark: #0a0e17;
            --ef-card: #161d2b;
            --ef-neon: #00ff88;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ef-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            border-bottom: 2px solid var(--ef-blue);
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: 2px;
        }

        .logo-text span {
            color: var(--ef-yellow);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 70, 173, 0.8);
        }

        header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        /* Shop Grid */
        .shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            padding-bottom: 50px;
        }

        /* Coin Card */
        .coin-card {
            background-color: var(--ef-card);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .coin-card:hover {
            transform: translateY(-10px);
            border-color: var(--ef-blue);
            box-shadow: 0 15px 30px rgba(0, 70, 173, 0.3);
        }

        .coin-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--ef-yellow));
        }

        .coin-amount {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .price-tag {
            color: var(--ef-neon);
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .buy-btn {
            background-color: var(--ef-yellow);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #e6da00;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .shop-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">eFootball <span>COIN HUB</span></div>
    </nav>

    <header>
        <h1>TOP-UP COINS</h1>
        <p>Instant delivery to your eFootball� account</p>
    </header>

    <div class="shop-container">
        <div class="coin-card">
            <img src="coin.png" alt="Coin" class="coin-icon">
            <div class="coin-amount">500 Coins</div>
            <div class="price-tag">UGX 1,000</div>
            <button class="buy-btn" onclick="redirectToVisa()">Purchase</button>
        </div>

        <div class="coin-card">
            <img src="coin.png" alt="Coin" class="coin-icon">
            <div class="coin-amount">2,500 Coins</div>
            <div class="price-tag">UGX 5,000</div>
            <button class="buy-btn" onclick="redirectToVisa()">Purchase</button>
        </div>

        <div class="coin-card">
            <img src="coin.png" alt="Coin" class="coin-icon">
            <div class="coin-amount">5,000 Coins</div>
            <div class="price-tag">UGX 10,000</div>
            <button class="buy-btn" onclick="redirectToVisa()">Purchase</button>
        </div>
    </div>

    <script>
        function redirectToVisa() {
            // Animating the button slightly before redirecting
            console.log("Redirecting to secure payment...");
            window.location.href = "visa.html";
        }
    </script>

</body>
</html>
